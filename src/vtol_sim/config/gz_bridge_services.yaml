# ros_gz_bridge service bridge: lets the interceptor node drive its model pose
# at high rate via an async ROS service client instead of per-tick subprocesses.
- service_name: "/world/vtol_world/set_pose"
  ros_type_name: "ros_gz_interfaces/srv/SetEntityPose"
  gz_req_type_name: "gz.msgs.Pose"
  gz_rep_type_name: "gz.msgs.Boolean"
